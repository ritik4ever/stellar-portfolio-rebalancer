name: Bug Report
description: File a bug report
title: "[BUG] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Go to... 2. Click... 3. See error"
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options: [critical, major, minor, cosmetic]
    validations:
      required: true
