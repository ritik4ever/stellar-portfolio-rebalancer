name: Deploy

on:
  push:
    branches: [main]

jobs:
  zap-security-gate:
    name: Security Gate (ZAP)
    uses: ./.github/workflows/zap-scan.yml

  deploy:
    needs: zap-security-gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js for deployment metadata checks
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve Sentry release metadata
        run: node scripts/sentry-metadata.mjs --deployment production >> "$GITHUB_ENV"

      - name: Validate Sentry release metadata
        run: node scripts/sentry-metadata.mjs --validate

      - name: Build Docker images
        run: docker compose -f deployment/docker-compose.yml build

      - name: Validate local observability bootstrap
        run: bash scripts/bootstrap-observability.sh

      - name: Tear down observability stack
        if: always()
        run: docker compose -f deployment/docker-compose.yml --profile monitoring down -v
