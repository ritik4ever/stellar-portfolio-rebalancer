name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose -f deployment/docker-compose.yml build

      - name: Validate local observability bootstrap
        run: |
          bash scripts/bootstrap-observability.sh
          docker compose -f deployment/docker-compose.yml --profile monitoring down -v
