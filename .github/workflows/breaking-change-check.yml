name: Breaking Change Notes
on:
  pull_request:
    paths:
      - 'backend/src/api/**'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for breaking change notes
        run: |
          if git diff --name-only origin/main | grep -q 'backend/src/api'; then
            echo "API changes detected. Ensure release notes mention breaking changes."
          fi
