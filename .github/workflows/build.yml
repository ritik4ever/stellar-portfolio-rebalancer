name: Build

on:
  pull_request:

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Prepare artifact workspace
        run: mkdir -p artifacts/sbom

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Package frontend bundle
        working-directory: frontend
        run: tar -czf ../artifacts/frontend-dist.tar.gz dist

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

