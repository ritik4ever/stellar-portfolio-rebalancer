name: Coverage

on:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Frontend coverage
      - name: Frontend coverage
        working-directory: frontend
        run: |
          npm ci
          npm run test:coverage

      # Backend coverage
      - name: Backend coverage
        working-directory: backend
        run: |
          npm ci
          npm run test:coverage
