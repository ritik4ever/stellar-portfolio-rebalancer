name: Sharded Tests
on:
  pull_request:
    paths:
      - 'backend/**'
jobs:
  test:
    strategy:
      matrix:
        shard: [1, 2, 3]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm --prefix backend ci
      - run: npm --prefix backend test -- --shard=${{ matrix.shard }}/3
