version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      root-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      backend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      frontend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /contracts
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      contracts-dependencies:
        patterns:
          - "*"
