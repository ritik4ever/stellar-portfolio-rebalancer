groups:
  - name: portfolio-observability
    rules:
      - alert: BackendDown
        expr: up{job="portfolio-backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: Backend metrics endpoint is unavailable
          description: Prometheus cannot scrape the backend /metrics endpoint for 2 minutes.

      - alert: BackendReadinessFailed
        expr: probe_success{job="portfolio-readiness", instance="http://backend:3001/readiness"} == 0
        for: 2m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: Backend readiness probe is failing
          description: The backend /readiness endpoint is returning a non-2xx response.

      - alert: FrontendUptimeProbeFailed
        expr: probe_success{job="portfolio-readiness", instance="http://frontend:80/"} == 0
        for: 5m
        labels:
          severity: critical
          service: frontend
        annotations:
          summary: Frontend uptime probe failed
          description: The frontend root endpoint has been unavailable for 5 minutes.

      - alert: Elevated5xxRate
        expr: sum(rate(stellar_portfolio_http_requests_total{status_code=~"5.."}[5m])) / clamp_min(sum(rate(stellar_portfolio_http_requests_total[5m])), 1) > 0.05
        for: 10m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: Elevated backend 5xx rate
          description: More than 5% of backend requests have been failing with 5xx responses for 10 minutes.

      - alert: RebalanceQueueFailures
        expr: stellar_portfolio_queue_jobs{queue="rebalance", state="failed"} > 0
        for: 5m
        labels:
          severity: warning
          service: queue
        annotations:
          summary: Failed rebalance jobs detected
          description: The rebalance queue has failed jobs that need investigation.

      - alert: ReflectorStalePricesDetected
        expr: sum(increase(stellar_portfolio_reflector_stale_prices_total[15m])) > 0
        for: 5m
        labels:
          severity: warning
          service: prices
        annotations:
          summary: Reflector has served stale prices
          description: One or more stale Reflector price rows were observed in the last 15 minutes.

      - alert: ReflectorFallbackUsageSpike
        expr: sum(increase(stellar_portfolio_reflector_fallback_usage_total[1h])) >= 5
        for: 10m
        labels:
          severity: warning
          service: prices
        annotations:
          summary: Reflector fallback usage is elevated
          description: The backend has relied on cached or synthetic price fallbacks at least five times in the last hour.

  # ---------------------------------------------------------------------------
  # Loki retention & compaction health
  # ---------------------------------------------------------------------------
  - name: loki-retention
    rules:
      - alert: LokiCompactorNotRunning
        # loki_boltdb_shipper_compact_tables_operation_last_successful_run_timestamp_seconds
        # is updated every time the compactor finishes a cycle.  If it goes stale
        # for more than 30 minutes the compactor has stopped or failed.
        expr: |
          (time() - loki_boltdb_shipper_compact_tables_operation_last_successful_run_timestamp_seconds) > 1800
        for: 5m
        labels:
          severity: warning
          service: loki
        annotations:
          summary: Loki compactor has not run in the last 30 minutes
          description: >
            The Loki compactor last completed a cycle more than 30 minutes ago.
            Retention deletion will fall behind and disk usage may grow unbounded.
            Check the Loki container logs: `docker compose logs loki`.

      - alert: LokiIngestionRateLimitReached
        # loki_discarded_samples_total increments when per-stream rate limits fire.
        expr: |
          sum(rate(loki_discarded_samples_total[5m])) by (reason) > 0
        for: 5m
        labels:
          severity: warning
          service: loki
        annotations:
          summary: Loki is discarding samples due to rate limiting
          description: >
            Loki is dropping log samples because per-stream or global ingestion
            rate limits have been reached (reason={{ $labels.reason }}).
            Review per_stream_rate_limit in deployment/observability/loki/loki-config.yml
            or reduce log verbosity in the emitting service.

      - alert: LokiStorageVolumeHigh
        # Fired when the loki_data docker volume exceeds 80 % of its soft limit.
        # This is a best-effort check via node_filesystem metrics if the host
        # node exporter is available; adjust the path to match your mount point.
        expr: |
          (
            node_filesystem_avail_bytes{mountpoint=~".*/loki.*"} /
            node_filesystem_size_bytes{mountpoint=~".*/loki.*"}
          ) < 0.20
        for: 10m
        labels:
          severity: warning
          service: loki
        annotations:
          summary: Loki storage volume is above 80 % capacity
          description: >
            The Loki data volume has less than 20 % free space.
            Current retention settings: global 30 d, error 90 d, warn 60 d,
            debug 14 d.  Consider reducing retention periods or expanding the
            volume before the disk fills and Loki stops accepting writes.
