global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: portfolio-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:3001

  - job_name: portfolio-readiness
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://backend:3001/readiness
          - http://backend:3001/health
          - http://backend:3001/
          - http://backend:3001/api-docs
          - http://backend:3001/api-docs.json
          - http://frontend:80/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: portfolio-websocket
    metrics_path: /probe
    params:
      module: [websocket]
    static_configs:
      - targets:
          - http://backend:3001/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
