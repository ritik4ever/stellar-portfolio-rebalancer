auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# ---------------------------------------------------------------------------
# Compactor: runs the TSDB compaction + retention deletion loop.
# compaction_interval    – how often the compactor wakes up.
# retention_enabled      – MUST be true for delete_series to fire.
# delete_delay           – grace window before a deletion chunk is removed.
# retention_delete_delay – extra safety gap (must be > compaction_interval).
# ---------------------------------------------------------------------------
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

# ---------------------------------------------------------------------------
# Global limits and per-stream retention overrides.
#
# Retention tiers (global default → per-stream override):
#   default    30 days  – general application logs
#   level=error 90 days – errors kept longer for post-incident analysis
#   level=warn  60 days – warnings kept for trend analysis
#   level=info  30 days – operational logs, normal operational cost
#   level=debug 14 days – verbose debug logs, short life to control disk
#
# Tradeoffs documented in docs/OBSERVABILITY.md § Retention & Compaction.
# ---------------------------------------------------------------------------
limits_config:
  allow_structured_metadata: true
  volume_enabled: true

  # Global default: 30 days (must match or exceed shortest per-stream value)
  retention_period: 720h        # 30 days

  # Per-stream overrides (stream selector must match Promtail labels)
  per_stream_rate_limit: 3MB
  per_stream_rate_limit_burst: 15MB

  # Ingestion rate limits to prevent runaway log producers
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20

  # Max query window – prevents expensive full-history scans
  max_query_length: 0h          # 0 = unlimited; set per-environment if needed

  # Delete request limits
  max_entries_limit_per_query: 5000

# Per-stream retention overrides are expressed as stream selectors.
# These match the labels Promtail attaches (see promtail-config.yml).
per_stream_retention:
  - selector: '{level="error"}'
    priority: 10
    period: 2160h   # 90 days
  - selector: '{level="warn"}'
    priority: 9
    period: 1440h   # 60 days
  - selector: '{level="info"}'
    priority: 8
    period: 720h    # 30 days (same as global default – explicit for clarity)
  - selector: '{level="debug"}'
    priority: 7
    period: 336h    # 14 days

pattern_ingester:
  enabled: true

ruler:
  alertmanager_url: http://alertmanager:9093
